<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="360" viewBox="0 0 1200 360"
     role="img" aria-labelledby="title desc">
  <title id="title">DuckType</title>
  <desc id="desc">DuckType is a Monkeytype-style typing test purpose-built for code: real syntax highlighting, DSA problems, framework snippets, and an IDE mode, on a pond-dark mallard theme.</desc>

  <rect width="1200" height="360" rx="26" fill="#0d100e"/>
  <rect x="1" y="1" width="1198" height="358" rx="25" fill="none" stroke="#242b25"/>

  <!-- title block -->
  <g id="title-block" transform="translate(56 54)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <g transform="translate(0 4)">
      <path fill="#f2b32c" transform="scale(1.15)"
            d="M23.9 13.1c.3-.8.4-1.6.4-2.5C24.3 6.4 20.9 3 16.8 3c-3.6 0-6.7 2.6-7.4 6.1-1-.1-2-.5-2.7-1.3-.3 1.7.3 3.3 1.4 4.3C5.7 13.8 4 16.5 4 19.2 4 24 9.1 27 15.5 27c6.3 0 11.7-3.3 12.5-10.7-1.9 1.3-4.4 1.5-6.6.9z"/>
      <circle cx="21.7" cy="6.9" r="1.6" fill="#0d100e"/>
      <path fill="#f2b32c" transform="scale(1.15)" d="M24.2 9c1.6-.3 3.2.2 4 1.3-1 .9-2.6 1.2-4.2.9z"/>
    </g>
    <text x="42" y="26" font-size="34" font-weight="600" fill="#e6e4d5" letter-spacing="-0.5">DuckType<tspan fill="#f2b32c">_</tspan></text>

    <text x="2" y="76" font-size="19" fill="#e6e4d5">Monkeytype-style typing practice,</text>
    <text x="2" y="102" font-size="19" fill="#e6e4d5">purpose-built for real code.</text>

    <text x="2" y="140" font-size="14" fill="#5c6459">Real syntax highlighting. DSA, framework and language-idiom</text>
    <text x="2" y="160" font-size="14" fill="#5c6459">snippets. No dumbed-down plain-text lines.</text>

    <text x="2" y="204" font-size="13" fill="#5c6459">
      <tspan fill="#f2b32c">esc</tspan> command palette&#160;&#160;&#160;·&#160;&#160;&#160;<tspan fill="#f2b32c">tab</tspan> restart&#160;&#160;&#160;·&#160;&#160;&#160;8 themes
    </text>
  </g>

  <!-- code proof panel -->
  <g id="project-proof" transform="translate(624 40)">
    <rect width="524" height="280" rx="10" fill="#121613" stroke="#242b25"/>

    <!-- titlebar -->
    <rect width="524" height="34" rx="10" fill="#171c18"/>
    <rect y="24" width="524" height="10" fill="#171c18"/>
    <circle cx="22" cy="17" r="4" fill="#242b25"/>
    <circle cx="38" cy="17" r="4" fill="#242b25"/>
    <circle cx="54" cy="17" r="4" fill="#242b25"/>
    <text x="262" y="21" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5c6459" text-anchor="middle">two_sum.py</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#40473f" xml:space="preserve">
      <!-- gutter -->
      <text x="18" y="66" fill="#5c6459">1</text>
      <text x="18" y="92" fill="#5c6459">2</text>
      <text x="18" y="118" fill="#5c6459">3</text>
      <text x="18" y="144" fill="#5c6459">4</text>
      <text x="18" y="170" fill="#5c6459">5</text>
      <text x="18" y="196" fill="#5c6459">6</text>

      <!-- line 1: fully typed/correct -->
      <text x="46" y="66"><tspan fill="#e6e4d5">def </tspan><tspan fill="#f2b32c">two_sum</tspan><tspan fill="#e6e4d5">(nums: list[int], target: int):</tspan></text>

      <!-- line 2: correct -->
      <text x="46" y="92" fill="#e6e4d5">    seen: dict[int, int] = {}</text>

      <!-- line 3: correct -->
      <text x="46" y="118" fill="#e6e4d5">    for i, num in enumerate(nums):</text>

      <!-- line 4: mid-typing, one wrong char -->
      <text x="46" y="144"><tspan fill="#e6e4d5">        complement = ta</tspan><tspan fill="#d95a66" text-decoration="underline">r</tspan><tspan fill="#40473f">get - num</tspan></text>

      <!-- line 5: pending -->
      <text x="46" y="170" fill="#40473f">        if complement in seen:</text>

      <!-- line 6: pending -->
      <text x="46" y="196" fill="#40473f">            return [seen[complement], i]</text>
    </g>

    <!-- live stat chip -->
    <text x="18" y="256" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f2b32c">118 wpm</text>
    <text x="98" y="256" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#5c6459">97% acc</text>
    <rect x="18" y="266" width="488" height="3" rx="1.5" fill="#242b25"/>
    <rect x="18" y="266" width="330" height="3" rx="1.5" fill="#f2b32c"/>
  </g>
</svg>
